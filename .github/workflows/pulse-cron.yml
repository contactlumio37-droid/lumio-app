name: Pulse Runner — Hourly Cron
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}
jobs:
  trigger-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pulse-runner Edge Function
        run: |
          curl -sf -X POST \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/pulse-runner" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-pulse-secret: ${{ secrets.PULSE_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30
